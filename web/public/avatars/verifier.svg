<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- Dark background -->
  <circle cx="50" cy="50" r="50" fill="#0f1a2e"/>
  <!-- Monitor body -->
  <rect x="18" y="22" width="64" height="42" rx="5" fill="none" stroke="#c9a84c" stroke-width="3"/>
  <!-- Screen -->
  <rect x="23" y="27" width="54" height="32" rx="3" fill="#0a1628"/>
  <!-- Screen glow lines -->
  <line x1="28" y1="35" x2="58" y2="35" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>
  <line x1="28" y1="41" x2="52" y2="41" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>
  <line x1="28" y1="47" x2="46" y2="47" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>
  <!-- Magnifying glass over screen -->
  <circle cx="66" cy="46" r="8" fill="none" stroke="#c9a84c" stroke-width="2.5"/>
  <line x1="72" y1="52" x2="78" y2="58" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Stand neck -->
  <rect x="46" y="64" width="8" height="6" fill="#c9a84c" rx="1"/>
  <!-- Stand base -->
  <rect x="35" y="70" width="30" height="5" rx="2.5" fill="#c9a84c"/>
</svg>
